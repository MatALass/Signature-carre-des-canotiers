<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Preview — Signature Carré des Canotiers</title>
  </head>
  <body style="font-family:Arial,Helvetica,sans-serif;margin:24px;">
    <h1 style="margin:0 0 10px 0;">Preview — Signature Carré des Canotiers</h1>
    <p style="margin:0 0 20px 0;color:#444;">
      Cette page affiche les signatures générées dans <code>dist/</code>.
      (Local ou GitHub Pages)
    </p>

    <h2 style="margin:18px 0 8px 0;">Full</h2>
    <div style="border:1px solid #ddd;padding:16px;border-radius:10px;">
      <iframe
        src="../dist/signature.full.html"
        style="width:100%;height:220px;border:0;"
        title="Signature Full"
      ></iframe>
    </div>

    <h2 style="margin:18px 0 8px 0;">Compact</h2>
    <div style="border:1px solid #ddd;padding:16px;border-radius:10px;">
      <iframe
        src="../dist/signature.compact.html"
        style="width:100%;height:140px;border:0;"
        title="Signature Compact"
      ></iframe>
    </div>

    <h2 style="margin:18px 0 8px 0;">Texte</h2>
    <div style="border:1px solid #ddd;padding:16px;border-radius:10px;white-space:pre-wrap;">
      <iframe
        src="../dist/signature.text.txt"
        style="width:100%;height:240px;border:0;"
        title="Signature Texte"
      ></iframe>
    </div>

    <p style="margin-top:20px;color:#666;font-size:12px;">
      Note: certains clients email modifient le HTML. Teste dans Gmail/Outlook réel.
    </p>
  </body>
</html>
