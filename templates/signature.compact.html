<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signature - Compact</title>
  </head>
  <body>
    <!-- Compact variant: smaller logo + less lines -->

    <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
      <tr>
        <td style="vertical-align:middle;padding:0 10px 0 0;">
          <img
            src="{{ASSET_BASE_URL}}/logo.png"
            alt="{{ORG_NAME}}"
            width="{{LOGO_WIDTH_COMPACT}}"
            height="{{LOGO_HEIGHT_COMPACT}}"
            style="display:block;border:0;outline:none;text-decoration:none;"
          />
        </td>

        <td style="vertical-align:middle;">
          <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
            <tr>
              <td style="font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:17px;color:#111111;font-weight:bold;">
                {{FULL_NAME}}
              </td>
            </tr>
            <tr>
              <td style="font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:16px;color:#444444;">
                {{ROLE_TITLE}} — <a href="{{WEBSITE_URL}}" style="color:{{ACCENT_COLOR}};text-decoration:none;">{{ORG_NAME}}</a>
              </td>
            </tr>
            <tr>
              <td style="font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:16px;color:#111111;">
                <a href="mailto:{{EMAIL}}" style="color:#111111;text-decoration:none;">{{EMAIL}}</a>
                &nbsp;•&nbsp;
                <a href="tel:{{PHONE_TEL}}" style="color:#111111;text-decoration:none;">{{PHONE_DISPLAY}}</a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
