<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signature - Full</title>
  </head>
  <body>
    <!--
      Email-safe signature:
      - Table layout
      - Inline CSS only
      - Avoids advanced CSS
    -->

    <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
      <tr>
        <!-- Logo -->
        <td style="vertical-align:top;padding:0 14px 0 0;">
          <img
            src="https://example.com/assets/logo.png"
            alt="Carré des Canotiers"
            width="96"
            height="96"
            style="display:block;border:0;outline:none;text-decoration:none;"
          />
        </td>

        <!-- Separator -->
        <td style="width:1px;background-color:#0B6E4F;padding:0;"></td>

        <!-- Content -->
        <td style="vertical-align:top;padding:0 0 0 14px;">
          <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
            <tr>
              <td style="font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:18px;color:#111111;font-weight:bold;">
                Prénom NOM
              </td>
            </tr>
            <tr>
              <td style="font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:18px;color:#444444;">
                Rôle / Fonction
              </td>
            </tr>

            <tr><td style="height:8px;line-height:8px;font-size:8px;">&nbsp;</td></tr>

            <!-- Contact -->
            <tr>
              <td style="font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:18px;color:#111111;">
                <span style="color:#666666;">T</span>:
                <a href="tel:+33000000000" style="color:#111111;text-decoration:none;">+33 0 00 00 00 00</a>
                &nbsp;&nbsp;|&nbsp;&nbsp;
                <span style="color:#666666;">E</span>:
                <a href="mailto:contact@example.com" style="color:#111111;text-decoration:none;">contact@example.com</a>
              </td>
            </tr>

            <tr>
              <td style="font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:18px;color:#111111;">
                <a href="https://www.carredescanotiers.fr" style="color:#0B6E4F;text-decoration:none;">carredescanotiers.fr</a>
                &nbsp;&nbsp;|&nbsp;&nbsp;
                <a href="https://www.helloasso.com" style="color:#0B6E4F;text-decoration:none;">Soutenir (HelloAsso)</a>
              </td>
            </tr>

            <tr><td style="height:10px;line-height:10px;font-size:10px;">&nbsp;</td></tr>

            <!-- Social icons -->
            <tr>
              <td>
                <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
                  <tr>
                    <td style="padding:0 8px 0 0;">
                      <a href="https://facebook.com" style="text-decoration:none;">
                        <img
                          src="https://example.com/assets/icons/facebook.png"
                          alt="Facebook"
                          width="18"
                          height="18"
                          style="display:block;border:0;outline:none;text-decoration:none;"
                        />
                      </a>
                    </td>
                    <td style="padding:0 8px 0 0;">
                      <a href="https://instagram.com" style="text-decoration:none;">
                        <img
                          src="https://example.com/assets/icons/instagram.png"
                          alt="Instagram"
                          width="18"
                          height="18"
                          style="display:block;border:0;outline:none;text-decoration:none;"
                        />
                      </a>
                    </td>
                    <td style="padding:0;">
                      <a href="https://vimeo.com" style="text-decoration:none;">
                        <img
                          src="https://example.com/assets/icons/vimeo.png"
                          alt="Vimeo"
                          width="18"
                          height="18"
                          style="display:block;border:0;outline:none;text-decoration:none;"
                        />
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <tr><td style="height:10px;line-height:10px;font-size:10px;">&nbsp;</td></tr>

            <!-- Disclaimer -->
            <tr>
              <td style="font-family:Arial,Helvetica,sans-serif;font-size:11px;line-height:15px;color:#777777;max-width:420px;">
                Ce message et ses pièces jointes sont confidentiels.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
